<!doctype html>
<html lang="es-AR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#183f31">
  <meta name="color-scheme" content="light">
  <title>Lluvias · por Sudamericana</title>
  <meta name="description" content="Mapa comunitario de lluvias. Mirá reportes cercanos e informá milímetros en segundos.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/lluvias-192.png">
  <link rel="apple-touch-icon" href="./icons/lluvias-192.png">
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="./app.css">
</head>
<body>
  <div class="app" data-app>
    <header class="topbar">
      <a class="brand" href="./" aria-label="Lluvias por Sudamericana">
        <svg class="pixel-mark" viewBox="0 0 32 32" aria-hidden="true">
          <g class="pixel-drop">
            <rect x="14" y="2" width="4" height="4"/><rect x="10" y="6" width="12" height="4"/>
            <rect x="8" y="10" width="16" height="4"/><rect x="6" y="14" width="20" height="6"/>
            <rect x="8" y="20" width="16" height="4"/><rect x="10" y="24" width="12" height="4"/>
          </g>
        </svg>
        <span><strong>LLUVIAS</strong><small>por Sudamericana</small></span>
      </a>
      <button class="account-button is-pending" type="button" data-account aria-label="Cuenta" aria-busy="true">
        <span class="account-dot"></span><span data-account-label>Cuenta</span>
      </button>
    </header>

    <main class="map-stage">
      <div id="app-map" class="map" aria-label="Mapa de reportes de lluvia"></div>

      <div class="map-status" data-map-status aria-live="polite">
        <span class="pulse"></span><span>Cargando zona cercana…</span>
      </div>

      <div class="map-tools" aria-label="Controles de mapa">
        <button type="button" data-map-mode="basic" class="is-active">Básico</button>
        <button type="button" data-map-mode="satellite">Satélite</button>
      </div>

      <button class="locate-button" type="button" data-locate aria-label="Ir a mi ubicación">◎</button>
    </main>

    <footer class="actionbar">
      <button class="report-cta" type="button" data-open-report>
        <span>＋</span> INFORMAR LLUVIA
      </button>
      <button class="pending-chip" type="button" data-pending-chip hidden>
        <span data-pending-count>0</span> pendiente
      </button>
    </footer>
  </div>

  <dialog class="sheet" data-report-dialog>
    <form method="dialog" class="sheet-card" data-report-form>
      <div class="sheet-head">
        <div><p class="eyebrow">Nuevo reporte</p><h1>¿Cuánto llovió?</h1></div>
        <button type="button" class="icon-button" data-close-report aria-label="Cerrar">×</button>
      </div>

      <label class="mm-field">
        <span class="sr-only">Milímetros</span>
        <input name="millimeters" inputmode="decimal" autocomplete="off" placeholder="42" min="0.1" max="500" step="0.1" required>
        <b>mm</b>
      </label>

      <div class="location-card">
        <div><span class="location-icon">●</span><div><b data-location-title>Ubicación del mapa</b><small data-location-detail>Revisá el punto antes de enviar</small></div></div>
        <button type="button" data-use-location>Usar mi ubicación</button>
      </div>

      <label class="time-row">
        <span>Hora de medición</span>
        <input type="datetime-local" name="observedAt" required>
      </label>

      <details class="more-details">
        <summary>Más detalles</summary>
        <div class="details-grid">
          <label>Intensidad
            <select name="intensity"><option value="weak">Débil</option><option value="moderate" selected>Moderada</option><option value="strong">Fuerte</option></select>
          </label>
          <label>Referencia de zona<input name="placeLabel" maxlength="100" placeholder="Ej. Colonia El Pastoril"></label>
          <label class="check"><input type="checkbox" name="ongoing"> Sigue lloviendo</label>
          <label class="check"><input type="checkbox" name="measured" checked> Medido con pluviómetro</label>
          <label class="wide">Comentario<textarea name="comment" maxlength="220" rows="2"></textarea></label>
        </div>
      </details>

      <div class="turnstile-slot" data-turnstile-host><small>La verificación de seguridad se carga solo al reportar.</small></div>
      <p class="form-message" data-report-message aria-live="polite"></p>

      <button class="submit-report" type="submit">ENVIAR REPORTE</button>
      <button class="cancel-report" type="button" data-close-report>Cancelar</button>
    </form>
  </dialog>

  <dialog class="sheet account-sheet" data-account-dialog>
    <div class="sheet-card">
      <div class="sheet-head"><div><p class="eyebrow">Cuenta</p><h1 data-account-title>Tu actividad</h1></div><button class="icon-button" type="button" data-close-account>×</button></div>
      <div data-account-content><p class="muted">La sesión se consulta en segundo plano.</p></div>
      <a class="web-account-link" href="/lluvias.html#cuenta">Abrir gestión completa de cuenta</a>
    </div>
  </dialog>

  <div class="toast" data-toast hidden></div>
  <div class="turnstile-sync-host" data-sync-turnstile-host></div>

  <script>
    window.LLUVIAS_APP_CONFIG = {
      apiBase: 'https://lluvias-api.sudamericanasrl.com',
      turnstileSiteKey: '0x4AAAAAADw9UWpVAQYqzGRw',
      appVersion: '0.1.0'
    };
  </script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="./app.js" defer></script>
</body>
</html>
